name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect:
    name: detect version bump
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.check.outputs.publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Compare local version to npm
        id: check
        shell: bash
        run: |
          CURR=$(node -p "require('./package.json').version")
          CARGO_V=$(awk -F\" '/^version[[:space:]]*=/ {print $2; exit}' Cargo.toml)
          if [ "$CURR" != "$CARGO_V" ]; then
            echo "::error::package.json version ($CURR) != Cargo.toml version ($CARGO_V). Bump both before releasing — the Rust binary reports CARGO_PKG_VERSION."
            exit 1
          fi
          PUBLISHED=$(npm view fig2r version 2>/dev/null || echo "")
          echo "Local: $CURR  Cargo: $CARGO_V  On npm: ${PUBLISHED:-<unpublished>}"
          echo "version=$CURR" >> "$GITHUB_OUTPUT"
          if [ "$CURR" != "$PUBLISHED" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "fig2r@$CURR already on npm — skipping release."
          fi

  build:
    name: build ${{ matrix.name }}
    needs: detect
    if: needs.detect.outputs.publish == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            target: aarch64-apple-darwin
            os: macos-14
            node_os: darwin
            node_arch: arm64
          - name: darwin-x64
            target: x86_64-apple-darwin
            os: macos-14
            node_os: darwin
            node_arch: x64
          - name: linux-x64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            node_os: linux
            node_arch: x64
          - name: linux-arm64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            node_os: linux
            node_arch: arm64
            use-cross: true
          - name: win32-x64
            target: x86_64-pc-windows-msvc
            os: windows-latest
            node_os: win32
            node_arch: x64
          - name: win32-arm64
            target: aarch64-pc-windows-msvc
            os: windows-latest
            node_os: win32
            node_arch: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (linux-arm64 only)
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Assemble platform npm package
        shell: bash
        env:
          VERSION: ${{ needs.detect.outputs.version }}
          PKG_NAME: "@taradepan1313/fig2r-${{ matrix.name }}"
          NODE_OS: ${{ matrix.node_os }}
          NODE_ARCH: ${{ matrix.node_arch }}
          TARGET: ${{ matrix.target }}
          IS_WINDOWS: ${{ runner.os == 'Windows' }}
          DIST_DIR: npm-dist/fig2r-${{ matrix.name }}
        run: |
          mkdir -p "$DIST_DIR/bin"
          if [ "$IS_WINDOWS" = "true" ]; then
            cp "target/$TARGET/release/fig2r.exe" "$DIST_DIR/bin/"
          else
            cp "target/$TARGET/release/fig2r" "$DIST_DIR/bin/"
            chmod +x "$DIST_DIR/bin/fig2r"
          fi
          node -e "
            const fs = require('fs');
            const pkg = {
              name: process.env.PKG_NAME,
              version: process.env.VERSION,
              description: 'Native binary for fig2r (' + process.env.NODE_OS + '-' + process.env.NODE_ARCH + ')',
              license: 'MIT',
              repository: { type: 'git', url: 'git+https://github.com/taradepan/fig2r.git' },
              os: [process.env.NODE_OS],
              cpu: [process.env.NODE_ARCH],
              files: ['bin/']
            };
            fs.writeFileSync(process.env.DIST_DIR + '/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Upload platform package
        uses: actions/upload-artifact@v7
        with:
          name: fig2r-${{ matrix.name }}
          path: npm-dist/fig2r-${{ matrix.name }}
          retention-days: 1

  publish:
    name: npm publish
    needs: [detect, build]
    if: needs.detect.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # Node 24 bundles npm >= 11.5.1, required for trusted publishing OIDC handshake.
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download platform packages
        uses: actions/download-artifact@v8
        with:
          path: npm-dist

      - name: Publish platform packages
        run: |
          set -euo pipefail
          for dir in npm-dist/fig2r-*; do
            echo ">>> publishing $dir"
            (cd "$dir" && npm publish --provenance --access public)
          done

      - name: Sync optionalDependencies to main version
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            for (const k of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[k] = process.env.VERSION;
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          cat package.json

      - name: Publish main package
        run: npm publish --provenance --access public
